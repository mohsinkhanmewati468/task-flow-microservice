version: '3.9'

services:
  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      - auth-service
      - task-service
      - rabbitmq
      - redis
      - mongo
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - .env
    depends_on:
      - mongo
      - rabbitmq
      - redis
    restart: unless-stopped

  task-service:
    build:
      context: .
      dockerfile: apps/task-service/Dockerfile
    ports:
      - '3002:3002'
    env_file:
      - .env
    depends_on:
      - mongo
      - rabbitmq
      - redis
    restart: unless-stopped

  consumer-service:
    build:
      context: .
      dockerfile: apps/consumer-service/Dockerfile
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - '5672:5672' # messaging
      - '15672:15672' # dashboard
    restart: unless-stopped
